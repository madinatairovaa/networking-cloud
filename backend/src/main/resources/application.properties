# ===================================================================
# Wholesale Clothing Management Platform - Application Configuration
# ===================================================================

spring.application.name=wholesale-platform

# ===================================================================
# Server Configuration
# ===================================================================
server.port=8080
server.servlet.context-path=/api
server.error.include-message=always
server.error.include-binding-errors=always

# ===================================================================
# PostgreSQL Database Configuration
# ===================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/networking_db
spring.datasource.username=postgres
spring.datasource.password=1111
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# ===================================================================
# JPA / Hibernate Configuration
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false

# ===================================================================
# JWT Configuration
# ===================================================================
app.jwt.secret=wholesale-platform-secret-key-for-jwt-token-generation-must-be-at-least-256-bits-long-for-hs256
app.jwt.access-token-expiration=900000
app.jwt.refresh-token-expiration=604800000

# ===================================================================
# OTP Configuration
# ===================================================================
app.otp.length=6
app.otp.expiration-minutes=10
app.otp.dev-mode=true

# ===================================================================
# Application Configuration
# ===================================================================
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001
app.default-page-size=20
app.max-page-size=100

# ===================================================================
# Actuator / Monitoring
# ===================================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true

# ===================================================================
# Logging
# ===================================================================
logging.level.root=INFO
logging.level.com.wholesale.platform=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ===================================================================
# Swagger / OpenAPI
# ===================================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# ===================================================================
# File Upload
# ===================================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
