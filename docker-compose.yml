version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: wholesale-db
    environment:
      POSTGRES_DB: networking_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1111"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - wholesale-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wholesale-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/networking_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: "1111"
      SPRING_PROFILES_ACTIVE: docker
      APP_JWT_SECRET: wholesale-platform-secret-key-for-jwt-token-generation-must-be-at-least-256-bits-long-for-hs256
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wholesale-network
    restart: unless-stopped

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wholesale-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8080/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - wholesale-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  wholesale-network:
    driver: bridge
    name: wholesale-network
